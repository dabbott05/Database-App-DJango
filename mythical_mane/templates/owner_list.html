<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Owner Directory</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-8">
    <div class="max-w-4xl mx-auto">
        <div class="flex justify-between items-center mb-8 border-b-4 border-indigo-500 pb-4">
            <h1 class="text-4xl font-extrabold text-gray-800">Owner Directory</h1>
            <a href="{% url 'owner_create' %}" class="bg-indigo-600 text-white px-4 py-2 rounded shadow hover:bg-indigo-700 transition">
                + Add New Owner
            </a>
        </div>
        
        <div class="space-y-4">
            {% for owner in owners %}
            <div class="bg-white rounded-lg shadow p-6 flex justify-between items-center border-l-4 border-indigo-500">
                <div>
                    <h2 class="text-xl font-bold text-gray-900">{{ owner.name }}</h2>
                    <p class="text-sm text-gray-600">{{ owner.email|default:"No email" }} | {{ owner.phone|default:"No phone" }}</p>
                    <p class="text-xs text-indigo-500 font-semibold mt-1 uppercase">{{ owner.universe.name }}</p>
                </div>
                <div class="space-x-2">
                    <a href="{% url 'owner_update' owner.pk %}" class="text-blue-600 hover:underline font-medium">Edit</a>
                    <span class="text-gray-300">|</span>
                    <a href="{% url 'owner_delete' owner.pk %}" class="text-red-600 hover:underline font-medium">Delete</a>
                </div>
            </div>
            {% empty %}
            <p class="text-gray-500 italic">No owners found in the database.</p>
            {% endfor %}
        </div>
        
        <div class="mt-8">
            <a href="/patients/" class="text-indigo-600 hover:underline">&larr; Back to Patients</a>
        </div>
    </div>
</body>
</html>
