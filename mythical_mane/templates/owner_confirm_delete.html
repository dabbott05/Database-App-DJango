<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Confirm Delete</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-8 flex items-center justify-center min-h-screen">
    <div class="max-w-md w-full bg-white rounded-lg shadow-lg p-8 border-t-4 border-red-500 text-center">
        <h1 class="text-2xl font-bold text-gray-900 mb-4">Are you absolutely sure?</h1>
        
        <p class="text-gray-600 mb-8">
            You are about to permanently delete the owner <strong class="text-gray-900">"{{ object.name }}"</strong>. 
            This action cannot be undone.
        </p>
        
        <form method="POST">
            {% csrf_token %}
            <div class="flex justify-center space-x-4">
                <button type="submit" class="bg-red-600 text-white px-6 py-2 rounded shadow hover:bg-red-700 transition">
                    Yes, Delete
                </button>
                <a href="{% url 'owner_list' %}" class="bg-gray-200 text-gray-800 px-6 py-2 rounded hover:bg-gray-300 transition">
                    Cancel
                </a>
            </div>
        </form>
    </div>
</body>
</html>
