<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Owner Form</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* A little custom CSS to make Django's default form inputs look nicer */
        input[type="text"], input[type="email"], select {
            width: 100%; padding: 0.5rem; margin-top: 0.25rem; margin-bottom: 1rem;
            border: 1px solid #d1d5db; border-radius: 0.375rem;
        }
    </style>
</head>
<body class="bg-gray-100 p-8">
    <div class="max-w-xl mx-auto bg-white rounded-lg shadow-lg p-8 border-t-4 border-indigo-500">
        <h1 class="text-3xl font-bold text-gray-800 mb-6">
            {% if object %}Edit Owner{% else %}Add New Owner{% endif %}
        </h1>
        
        <form method="POST">
            {% csrf_token %}
            
            <div class="text-gray-700 font-medium">
                {{ form.as_p }}
            </div>
            
            <div class="mt-6 flex space-x-4">
                <button type="submit" class="bg-indigo-600 text-white px-6 py-2 rounded shadow hover:bg-indigo-700 transition">
                    Save Owner
                </button>
                <a href="{% url 'owner_list' %}" class="text-gray-600 border border-gray-300 px-6 py-2 rounded hover:bg-gray-50 transition">
                    Cancel
                </a>
            </div>
        </form>
    </div>
</body>
</html>
